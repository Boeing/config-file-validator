config:
  command: null
  cwd: /tmp/cfv-demo
  env:
    recording: true
  cols: 80
  rows: 16
  repeat: 0
  quality: 100
  frameDelay: auto
  maxIdleTime: 2000
  frameBox:
    type: null
    title: null
    style: []
  watermark:
    imagePath: null
  cursorStyle: block
  fontFamily: "Monaco, Menlo, monospace"
  fontSize: 14
  lineHeight: 1.2
  letterSpacing: 0
  theme:
    background: "#1e1e2e"
    foreground: "#cdd6f4"
    cursor: "#f5e0dc"
    black: "#45475a"
    red: "#f38ba8"
    green: "#a6e3a1"
    yellow: "#f9e2af"
    blue: "#89b4fa"
    magenta: "#cba6f7"
    cyan: "#94e2d5"
    white: "#bac2de"
    brightBlack: "#585b70"
    brightRed: "#f38ba8"
    brightGreen: "#a6e3a1"
    brightYellow: "#f9e2af"
    brightBlue: "#89b4fa"
    brightMagenta: "#cba6f7"
    brightCyan: "#94e2d5"
    brightWhite: "#a6adc8"
records:
  - delay: 500
    content: "$ validator .\r\n"
  - delay: 800
    content: "    \x1b[32m✓\x1b[0m .env\r\n"
  - delay: 100
    content: "    \x1b[31m×\x1b[0m broken.json\r\n"
  - delay: 50
    content: "        error: syntax: line 2, column 1: unexpected end of JSON input\r\n"
  - delay: 100
    content: "    \x1b[32m✓\x1b[0m config.yaml\r\n"
  - delay: 100
    content: "    \x1b[32m✓\x1b[0m db.toml\r\n"
  - delay: 100
    content: "    \x1b[32m✓\x1b[0m package.json\r\n"
  - delay: 100
    content: "    \x1b[32m✓\x1b[0m settings.xml\r\n"
  - delay: 3000
    content: ""
