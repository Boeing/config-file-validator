title: Config File Validator
description: >-
  Cross-platform CLI tool to validate and lint JSON, YAML, TOML, XML, HCL, INI,
  HOCON, ENV, CSV, Properties, EDITORCONFIG, PList, SARIF, and TOON configuration
  files with syntax checking and JSON Schema validation. Use locally, in CI/CD
  pipelines, or as a Go library.
