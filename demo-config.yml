# Terminalizer config for config-file-validator demo

command: bash -l
cwd: /tmp/cfv-demo
env:
  recording: true

cols: 100
rows: 25

frameDelay: auto
maxIdleTime: 1500
frameBox:
  type: null
  title: null
  style: []

watermark:
  imagePath: null

cursorStyle: block
fontFamily: "Monaco, Menlo, monospace"
fontSize: 14
lineHeight: 1.2
letterSpacing: 0

theme:
  background: "#1e1e2e"
  foreground: "#cdd6f4"
  cursor: "#f5e0dc"
  black: "#45475a"
  red: "#f38ba8"
  green: "#a6e3a1"
  yellow: "#f9e2af"
  blue: "#89b4fa"
  magenta: "#cba6f7"
  cyan: "#94e2d5"
  white: "#bac2de"
  brightBlack: "#585b70"
  brightRed: "#f38ba8"
  brightGreen: "#a6e3a1"
  brightYellow: "#f9e2af"
  brightBlue: "#89b4fa"
  brightMagenta: "#cba6f7"
  brightCyan: "#94e2d5"
  brightWhite: "#a6adc8"
